<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Network Monitor{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h1>NetMonitor</h1>
        </div>
        <nav>
            <ul class="sidebar-nav">
                <li>
                    <a href="{{ url_for('index') }}" class="{% if request.endpoint == 'index' %}active{% endif %}">
                        <span class="icon">📊</span>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('switches') }}" class="{% if request.endpoint == 'switches' or request.endpoint == 'add_switch' or request.endpoint == 'switch_detail' %}active{% endif %}">
                        <span class="icon">🖧</span>
                        <span>Devices</span>
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('alerts') }}" class="{% if request.endpoint == 'alerts' %}active{% endif %}">
                        <span class="icon">🔔</span>
                        <span>Alerts</span>
                    </a>
                </li>
                <li>
                    <a href="#" onclick="return false;">
                        <span class="icon">📈</span>
                        <span>Analytics</span>
                    </a>
                </li>
                <li>
                    <a href="#" onclick="return false;">
                        <span class="icon">📝</span>
                        <span>Logs</span>
                    </a>
                </li>
                <li>
                    <a href="#" onclick="return false;">
                        <span class="icon">⚙️</span>
                        <span>Settings</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
